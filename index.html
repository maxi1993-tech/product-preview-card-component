<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="styles.css">
  <title>Frontend Mentor | Product preview card component</title>

</head>

<body>

  <main>

    <article>

      <picture>

        <source srcset="./images/image-product-desktop.jpg" media="(min-width: 37.5rem)" />
        <img src="./images/image-product-mobile.jpg" alt="Gabrielle Essence perfume bottle surrounded by leaves" />

      </picture>

      <p>Perfume</p>
      <h1>Gabrielle Essence Eau De Parfum</h1>
      <p>A floral, solar and voluptuous interpretation composed by Olivier Polge,
        Perfumer-Creator for the House of CHANEL.</p>
      <p><span>$149.99</span><span class="price-old">$169.99</span></p>
      <button type="button" value="add-to-cart">Add to Cart</button>

    </article>

  </main>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="#">Maxime Chapelle</a>.
  </footer>
</body>

</html>
