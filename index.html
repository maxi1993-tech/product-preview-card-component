<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Product preview card component</title>

</head>

<body>

  <main>

    <article class="card">

      <picture>

        <source srcset="./images/image-product-desktop.jpg" media="(min-width: 37.5rem)" />
        <img src="./images/image-product-mobile.jpg" alt="Gabrielle Essence perfume bottle surrounded by leaves" />

      </picture>
      <div class="card-content">
        <div class="card-info">
          <p class="card-tag">Perfume</p>
          <h1>Gabrielle Essence Eau De Parfum</h1>
          <p>A floral, solar and voluptuous interpretation composed by Olivier Polge,
            Perfumer-Creator for the House of CHANEL.</p>
        </div>
        <p class="card-price"><span>$149.99</span><span class="price-old">$169.99</span></p>
        <button type="button">
          <img class="button-svg" src="./images/icon-cart.svg" alt=""> Add to Cart
        </button>
      </div>
    </article>

  </main>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="#">Maxime Chapelle</a>.
  </footer>
</body>

</html>
